<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elkheta Teachers 2027</title>
    
    <!-- CSS Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    
    <style>
        :root {
            --elkheta-yellow: #FFDE59; /* Matching your logo */
            --elkheta-dark: #333333;
            --elkheta-bg: #fdfdfd;
        }

        body { 
            background-color: var(--elkheta-bg); 
            font-family: 'Inter', sans-serif; 
            color: var(--elkheta-dark);
        }

        /* Educational Header */
        .header-brand {
            background: var(--elkheta-dark);
            color: white;
            padding: 20px;
            border-bottom: 6px solid var(--elkheta-yellow);
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-img {
            max-height: 60px;
            margin-right: 20px;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            border-left: 5px solid var(--elkheta-yellow);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        .form-select {
            border: 2px solid #eee;
            border-radius: 8px;
        }

        /* Table Styling */
        .table-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .table thead {
            background: #f8f9fa;
        }

        .table thead th {
            color: var(--elkheta-dark);
            font-weight: 700;
            border-bottom: 3px solid var(--elkheta-yellow);
        }

        .grade-tag {
            background: var(--elkheta-yellow);
            color: var(--elkheta-dark);
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .status-pill {
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .active-status { background: #e1f7e3; color: #1b5e20; }
        .pending-status { background: #fff3e0; color: #e65100; }

        .btn-plan {
            background: var(--elkheta-dark);
            color: var(--elkheta-yellow);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid var(--elkheta-yellow);
        }

        .btn-plan:hover {
            background: var(--elkheta-yellow);
            color: var(--elkheta-dark);
        }

        #manualSyncBox { display: none; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- TOP HEADER -->
<div class="header-brand">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <!-- Ensure your logo file is named logo.png in the same folder -->
            <img src="logo.png" alt="Elkheta Logo" class="logo-img" onerror="this.style.display='none'">
            <div>
                <h1 class="h3 mb-0 fw-bold">Elkheta Teachers 2027</h1>
                <p class="mb-0 small text-warning">Quality Education Tracking System</p>
            </div>
        </div>
        <button class="btn btn-sm btn-outline-warning" onclick="$('#manualSyncBox').slideToggle()">Sync Options</button>
    </div>
</div>

<div class="container-fluid px-5">

    <!-- SYNC OPTIONS -->
    <div id="manualSyncBox" class="card card-body border-warning">
        <h6>Data Management</h6>
        <p class="small text-muted">If the table is empty, paste your Google Sheet data below:</p>
        <textarea id="csvInput" class="form-control mb-2" rows="3" placeholder="Paste data here..."></textarea>
        <div class="d-flex gap-2">
            <button onclick="processManualData()" class="btn btn-dark btn-sm">Update Dashboard</button>
            <a href="https://docs.google.com/spreadsheets/d/13u2tEGtDgyZVY3kVit1MxGUFWdSs18W0VvMqa2q08zc/edit" target="_blank" class="btn btn-warning btn-sm">Open Source Sheet</a>
        </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-section">
        <div class="row g-4">
            <div class="col-md-3">
                <label class="form-label">Search Grade</label>
                <select id="gradeFilter" class="form-select shadow-sm"><option value="">All Grades</option></select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Search Subject</label>
                <select id="subjectFilter" class="form-select shadow-sm"><option value="">All Subjects</option></select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Search Teacher</label>
                <select id="teacherFilter" class="form-select shadow-sm"><option value="">All Teachers</option></select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Search Status</label>
                <select id="statusFilter" class="form-select shadow-sm"><option value="">All Statuses</option></select>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-card mb-5">
        <div id="loader" class="text-center py-5">
            <div class="spinner-grow text-warning" role="status"></div>
            <p class="mt-3 fw-bold">Loading Teacher Database...</p>
        </div>
        
        <table id="mainTable" class="table align-middle w-100" style="display:none;">
            <thead>
                <tr>
                    <th>Academic Grade</th>
                    <th>Subject</th>
                    <th>Teacher Name</th>
                    <th>Status</th>
                    <th>Plan 2025-2026</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_Kgkbr1AriHTKkh4q_UFsnZ7dsjY_jmsHnUCAZntKeweqzghGHyhCnXzc64R9QCaiT_yklgUCYRGj/pub?output=csv';

    $(document).ready(function() {
        // Auto-fetch data
        Papa.parse(SHEET_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => renderTable(results.data),
            error: () => $("#loader").html('<p class="text-danger">Sync Blocked by Browser. Please use manual sync.</p>')
        });
    });

    function processManualData() {
        const text = $("#csvInput").val();
        Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
            complete: (results) => renderTable(results.data)
        });
    }

    function renderTable(data) {
        $("#loader").hide();
        $("#mainTable").show();
        const tbody = $("#tableBody").empty();

        data.forEach(row => {
            const grade = row.Grade || Object.values(row)[0];
            const subject = row.Subject || Object.values(row)[1];
            const teacher = row.Teacher || Object.values(row)[2];
            const status = row.Status || Object.values(row)[3];
            const plan = row.Plan || Object.values(row)[4];

            if (!grade || grade.toLowerCase().includes("grade")) return;

            const stClass = (status && (status.toLowerCase().includes('done') || status.toLowerCase().includes('active'))) ? 'active-status' : 'pending-status';
            const planBtn = (plan && plan.includes('http')) ? `<a href="${plan}" target="_blank" class="btn-plan">View Plan</a>` : '<span class="text-muted small">Not Uploaded</span>';

            tbody.append(`
                <tr>
                    <td><span class="grade-tag">${grade}</span></td>
                    <td><span class="fw-bold">${subject}</span></td>
                    <td>${teacher}</td>
                    <td><span class="status-pill ${stClass}">${status}</span></td>
                    <td>${planBtn}</td>
                </tr>
            `);
        });

        const table = $('#mainTable').DataTable({
            pageLength: 20,
            dom: 'rtip',
            responsive: true
        });

        // Setup Filters
        const filters = [
            { id: '#gradeFilter', col: 0 },
            { id: '#subjectFilter', col: 1 },
            { id: '#teacherFilter', col: 2 },
            { id: '#statusFilter', col: 3 }
        ];

        filters.forEach(f => {
            const select = $(f.id).empty().append('<option value="">All</option>');
            table.column(f.col).data().unique().sort().each(d => {
                const text = d.replace(/<\/?[^>]+(>|$)/g, "");
                if(text) select.append(`<option value="${text}">${text}</option>`);
            });
            select.off().on('change', function() {
                const val = $.fn.dataTable.util.escapeRegex($(this).val());
                table.column(f.col).search(val ? '^' + val + '$' : '', true, false).draw();
            });
        });
    }
</script>

</body>
</html>
